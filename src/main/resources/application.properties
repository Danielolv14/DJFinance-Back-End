# ── Banco de dados ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/druds_db
spring.datasource.username=postgres
spring.datasource.password=1402
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
# update: cria/atualiza as tabelas automaticamente (ideal para desenvolvimento)
# create-drop: recria tudo ao iniciar e apaga ao encerrar (ideal para testes)
# validate: apenas valida sem alterar (ideal para produção)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Servidor ─────────────────────────────────────────────────────────────────
server.port=8080
